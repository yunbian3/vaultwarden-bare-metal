name: Auto Extract Vaultwarden Binary

on:
  schedule:
    - cron: '0 2 * * *' # 北京时间每天上午 10 点自动检查并运行
  workflow_dispatch:      # 允许手动触发构建

# ⬇️ 新增全局环境变量，强行开启 Node.js 24 完美兼容模式，抹除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Latest Vaultwarden Alpine Image and Extract
        run: |
          mkdir -p tmp/output
          cd tmp
          
          # 下载免 Docker 镜像提取脚本
          wget https://raw.githubusercontent.com/jjlin/docker-image-extract/main/docker-image-extract
          chmod +x docker-image-extract
          
          # 提取最新版 Vaultwarden 官方 Alpine 镜像
          ./docker-image-extract vaultwarden/server:alpine
          
          # 建立归档目录
          mkdir -p dist
          BINARY_PATH=$(find output -name "vaultwarden" -type f | head -n 1)
          cp "$BINARY_PATH" ./dist/
          cp -r output/web-vault ./dist/
          
          # 压缩打包
          cd dist
          tar -czvf ../../vaultwarden-bare-metal.tar.gz *
          
      - name: Get Current Date for Tag
        id: date
        run: echo "date=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.date }}
          name: Vaultwarden Bare Metal v${{ steps.date.outputs.date }}
          body: |
            This is an automated binary extraction from `vaultwarden/server:alpine`.
          draft: false
          prerelease: false
          files: vaultwarden-bare-metal.tar.gz
