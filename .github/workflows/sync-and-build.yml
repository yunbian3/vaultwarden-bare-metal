name: Auto Extract Vaultwarden Binary

on:
  schedule:
    - cron: '0 2 * * *' # 北京时间每天上午 10 点自动检查并运行
  workflow_dispatch:      # 允许手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 使用纯 Git 命令拉取代码，彻底告别 Node 警告
      - name: Clone Repository
        run: |
          git clone --depth=1 https://github.com/${{ github.repository }}.git .

      - name: Fetch Latest Vaultwarden Alpine Image and Extract
        run: |
          mkdir -p tmp/output
          cd tmp
          
          # 下载免 Docker 镜像提取脚本
          wget https://raw.githubusercontent.com/jjlin/docker-image-extract/main/docker-image-extract
          chmod +x docker-image-extract
          
          # 提取最新版 Vaultwarden 官方 Alpine 镜像
          ./docker-image-extract vaultwarden/server:alpine
          
          # 建立归档目录
          mkdir -p dist
          BINARY_PATH=$(find output -name "vaultwarden" -type f | head -n 1)
          cp "$BINARY_PATH" ./dist/
          cp -r output/web-vault ./dist/
          
          # 压缩打包
          cd dist
          tar -czvf ../../vaultwarden-bare-metal.tar.gz *
          
      - name: Get Current Date for Tag
        id: date
        run: echo "date=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      # 2. 使用系统自带的 gh 工具创建 Release（已剔除手抖错别字）
      - name: Create Release and Upload Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v${{ steps.date.outputs.date }}"
          
          echo "🚀 Creating release for $TAG_NAME..."
          
          gh release create "$TAG_NAME" vaultwarden-bare-metal.tar.gz \
            --title "Vaultwarden Bare Metal $TAG_NAME" \
            --notes "This is an automated binary extraction from \`vaultwarden/server:alpine\`." \
            --repo "${{ github.repository }}"
