name: Auto Extract Vaultwarden Binary

on:
  schedule:
    - cron: '0 2 * * *' # 北京时间每天上午 10 点自动检查并运行
  workflow_dispatch:      # 允许手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 显式使用支持更高 Node 版本的最新 actions/checkout
      - name: Checkout Code
        uses: actions/checkout@v4.2.2 # 👈 指定到修复了 node20 warning 的具体小版本，或者未来直接用 @v5

      - name: Fetch Latest Vaultwarden Alpine Image and Extract
        run: |
          mkdir -p tmp/output
          cd tmp
          
          # 下载免 Docker 镜像提取脚本
          wget https://raw.githubusercontent.com/jjlin/docker-image-extract/main/docker-image-extract
          chmod +x docker-image-extract
          
          # 提取最新版 Vaultwarden 官方 Alpine 镜像
          ./docker-image-extract vaultwarden/server:alpine
          
          # 建立归档目录
          mkdir -p dist
          BINARY_PATH=$(find output -name "vaultwarden" -type f | head -n 1)
          cp "$BINARY_PATH" ./dist/
          cp -r output/web-vault ./dist/
          
          # 压缩打包
          cd dist
          tar -czvf ../../vaultwarden-bare-metal.tar.gz *
          
      - name: Get Current Date for Tag
        id: date
        run: echo "date=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      # 2. 如果 softprops/action-gh-release 依然报警告，我们换成 GitHub 官方原生、维护最频繁的官方 release 工具，彻底根除第三方依赖的 Node 滞后问题
      - name: Create GitHub Release
        uses: actions/github-script@v7 # 👈 官方脚本原生完美支持最新 Node 环境
        with:
          script: |
            const fs = require('fs');
            const tag = 'v' + '${{ steps.date.outputs.date }}';
            
            // 创建 release
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Vaultwarden Bare Metal ${tag}`,
              body: 'This is an automated binary extraction from `vaultwarden/server:alpine`.',
              draft: false,
              prerelease: false
            });
            
            // 上传打包好的资产文件
            const fileData = fs.readFileSync('vaultwarden-bare-metal.tar.gz');
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: 'vaultwarden-bare-metal.tar.gz',
              data: fileData,
              headers: {
                'content-type': 'application/gzip',
                'content-length': fileData.length
              }
            });
